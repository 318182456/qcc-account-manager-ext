<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>同步中心 - 企查查账号管理</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .config-card { background: white; padding: 24px 32px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; border: 1px solid #dadce0; }
        h2 { color: #1a73e8; margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 600; color: #5f6368; margin-bottom: 6px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        input:focus { outline: 2px solid #1a73e8; border-color: transparent; }
        .btn-group { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .primary-btn { background-color: #1a73e8; color: white; }
        .primary-btn:hover { background-color: #1557b0; }
        .tips { font-size: 12px; color: #80868b; margin-top: 4px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="config-card">
        <h2>WebDAV 私有同步中心</h2>
        
        <div class="form-group">
            <label>WebDAV 文件直链 URL</label>
            <input type="text" id="webdavUrl" placeholder="如: https://nas.example.com:5006/qcc-accounts/" />

            <div class="tips">请填写 WebDAV <strong>目录地址</strong>（以 / 结尾），扩展会在该目录下自动创建 manifest.json 及各账号文件。例如：https://nas.example.com:5006/qcc-accounts/</div>

        </div>

        <div class="form-group">
            <label>WebDAV 用户名</label>
            <input type="text" id="webdavUser" placeholder="admin" />
        </div>

        <div class="form-group">
            <label>WebDAV 密码 / Token</label>
            <input type="password" id="webdavPass" placeholder="******" />
        </div>

        <div class="form-group" style="flex-direction: row; align-items: center; margin-top: 8px;">
            <input type="checkbox" id="autoSync" checked style="width: 16px; height: 16px; margin: 0 8px 0 0;" />
            <label for="autoSync" style="margin: 0; font-weight: 500;">开启后台定时双向同步 (每30分钟)</label>
        </div>

        <div class="btn-group">
            <span id="saveStatus" style="color: green; font-size: 13px; align-self: center; display: none;">保存成功！</span>
            <button class="primary-btn" id="saveBtn">保存配置</button>
        </div>
    </div>
    <script src="options.js"></script>
</body>
</html>
