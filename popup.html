<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>企查查账号管理</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h2>🏢 企查查多账号管理</h2>
        </header>

        <div class="actions-card">
            <div class="status-indicator">
                <div>当前使用: <span id="currentAccountText">未知 / 未保存</span></div>
                <div>当前状态: <span id="accountStatusText" style="color: var(--text-muted) !important; font-weight: 500;">检测中...</span></div>
            </div>
            <div id="saveBox" style="display: flex; flex-direction: column; gap: 8px;">
                <input type="text" id="accNameInput" placeholder="输入当前账号备注 (如: 手机号)" />
                <button id="addCurrentBtn" class="primary-btn">保存当前账号信息</button>
            </div>
            <button id="clearAndAddNewBtn" class="danger-text">＋ 添加新账号</button>
        </div>

        <div class="list-section">
            <div class="list-header">
                <h3>已保存的账号</h3>
                <button id="checkAllBtn" class="secondary-btn check-all-btn">⚡ 一键测活</button>
            </div>
            <div id="accountList" class="account-list">
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                暂无保存的账号
            </div>
        </div>

        <div class="footer-actions">
            <button id="syncBtn" class="primary-btn" style="background: linear-gradient(135deg,#6366f1,#818cf8);">🔄 立即同步</button>
            <button id="openOptionsBtn" class="secondary-btn" style="flex: 0; padding: 9px 14px; white-space: nowrap;">⚙️ 配置</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
